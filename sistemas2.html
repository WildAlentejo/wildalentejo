<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Sistema | Wild Alentejo</title>
    
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* STATUS BAR */
        .status-bar {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 30px;
        }
        .status-bar-inner {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
        }
        .status-online { color: #27ae60; }
        .status-error  { color: var(--accent); }

        /* SENSOR CARDS */
        .sensor-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin: 0 0 20px;
        }
        @media (max-width: 900px) {
            .sensor-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 500px) {
            .sensor-grid { grid-template-columns: repeat(2, 1fr); }
        }
        .sensor-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 4px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-top: 4px solid var(--secondary);
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .sensor-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }
        .sensor-card h3 {
            margin: 0;
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #888;
            letter-spacing: 1px;
            font-weight: 800;
        }
        .temp-val {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--primary);
            margin: 10px 0 4px;
        }
        .hum-val {
            font-size: 0.95rem;
            color: #3498db;
            font-weight: 700;
        }

        /* SECTION LABEL */
        .section-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            font-weight: 800;
            margin: 50px 0 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .section-label::after {
            content: "";
            height: 1px;
            background: var(--border);
            flex-grow: 1;
        }

        /* CHARTS */
        .charts-row {
            display: grid;
            gap: 20px;
            margin-bottom: 20px;
        }
        .charts-row-2 { grid-template-columns: 1fr 1fr; }
        .charts-row-1 { grid-template-columns: 1fr; max-width: 600px; margin-left: auto; margin-right: auto; margin-bottom: 60px; }

        .chart-card {
            background: var(--card-bg);
            padding: 20px 22px;
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
            border-top: 3px solid var(--secondary);
        }
        .chart-header {
            font-weight: 800;
            font-size: 0.75rem;
            color: var(--primary);
            margin-bottom: 14px;
            text-transform: uppercase;
            border-bottom: 1px solid #eee;
            padding-bottom: 8px;
            letter-spacing: 0.8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .chart-header .sensor-dot {
            width: 8px; height: 8px;
            background: var(--secondary);
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
        }

        @media (max-width: 700px) {
            .charts-row-2 { grid-template-columns: 1fr; }
            .charts-row-1 { max-width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="container">
            <div class="logo">
                <a href="index.html"><img src="img/logo.png" alt="Wild Alentejo"></a>
            </div>
            <nav>
                <a href="index.html">Início</a>
                <a href="sistemas2.html" class="active">O Sistema</a>
                <a href="logbook.html">Logbook</a>
                <a href="adote.html">Adote-me</a>
                <a href="galeria.html">Galeria</a>
                <a href="loja.html">Loja</a>
                <a href="sobre.html">Contacto</a>
            </nav>
        </div>
    </header>

    <div class="status-bar">
        <div class="container status-bar-inner">
            <span id="status-text">● A CARREGAR DADOS...</span>
            <span>Sincronização: <span id="last-sync">--:--</span></span>
        </div>
    </div>

    <main class="container">
        <div class="section-label">Leituras em Tempo Real</div>
        <div class="sensor-grid" id="sensor-cards"></div>

        <div class="section-label">Histórico de 24 Horas</div>
        <div class="charts-row charts-row-2" id="sensor-charts-row1"></div>
        <div class="charts-row charts-row-2" id="sensor-charts-row2"></div>
        <div class="charts-row charts-row-1" id="sensor-charts-row3"></div>
    </main>

    <footer>
        <div class="container">
            <img src="img/logo.png" alt="Wild Alentejo" class="footer-logo">
            <p><strong>Wild Alentejo</strong> | Dashboard v2.2</p>
            <div class="footer-bottom">
                <p>&copy; 2025 Wild Alentejo | Mértola, Portugal.</p>
                <a href="privacidade.html" style="opacity:0.6; font-weight:400;">Política de Privacidade</a>
            </div>
        </div>
    </footer>

    <script>
        // Configuração: Link RAW do teu Gist para evitar erros de CORS da API
        const DATA_URL = "https://gist.githubusercontent.com/WildAlentejo/8e8d20f8c8534c53c8827a59e563884e/raw/wild-alentejo-sensors.json";
        const NOMES = ["Casa Principal", "Out", "Estufa", "Solo 1", "Solo 2"];

        async function fetchData() {
            try {
                // Adicionamos um timestamp para forçar o browser a ignorar a cache
                const response = await fetch(`${DATA_URL}?nocache=${Date.now()}`);
                if (!response.ok) throw new Error();
                
                const history = await response.json();
                const last = history[history.length - 1];

                // Atualizar Status e Relógio
                document.getElementById('last-sync').innerText = last.last_updated;
                document.getElementById('status-text').innerHTML = '<span class="status-online">● SISTEMA ONLINE</span>';

                let cardsHtml = "";

                for (let i = 1; i <= 5; i++) {
                    const t = last[`s${i}_t`];
                    const h = last[`s${i}_h`];

                    cardsHtml += `
                        <div class="sensor-card">
                            <h3>${NOMES[i-1]}</h3>
                            <div class="temp-val">${t ? t.toFixed(1) : "0.0"}°C</div>
                            <div class="hum-val">${h ? h.toFixed(0) : "0"}% Humidade</div>
                        </div>`;
                }

                document.getElementById('sensor-cards').innerHTML = cardsHtml;

                // Distribuir gráficos: 2 + 2 + 1
                let charts = [];
                for (let i = 1; i <= 5; i++) {
                    charts.push(`
                        <div class="chart-card">
                            <div class="chart-header"><span class="sensor-dot"></span>${NOMES[i-1]}</div>
                            <div id="plot_${i}" style="height:260px;"></div>
                        </div>`);
                }
                document.getElementById('sensor-charts-row1').innerHTML = charts[0] + charts[1];
                document.getElementById('sensor-charts-row2').innerHTML = charts[2] + charts[3];
                document.getElementById('sensor-charts-row3').innerHTML = charts[4];

                // Gerar Gráficos
                renderPlots(history);

            } catch (err) {
                console.error("Erro ao ler o Gist:", err);
                document.getElementById('status-text').innerHTML = '<span class="status-error">● ERRO DE LIGAÇÃO (GIST VAZIO?)</span>';
            }
        }

        function renderPlots(data) {
            const times = data.map(d => d.last_updated);
            
            for (let i = 1; i <= 5; i++) {
                const traceT = {
                    x: times, 
                    y: data.map(d => d[`s${i}_t`]),
                    name: 'Temp °C', 
                    type: 'scatter', 
                    mode: 'lines',
                    line: { color: '#CC4400', width: 3, shape: 'spline' }
                };

                const traceH = {
                    x: times, 
                    y: data.map(d => d[`s${i}_h`]),
                    name: 'Hum %', 
                    yaxis: 'y2', 
                    type: 'scatter', 
                    mode: 'lines',
                    line: { color: '#3498db', width: 2, dash: 'dot' }
                };

                const layout = {
                    margin: { l: 45, r: 45, t: 10, b: 40 },
                    showlegend: true,
                    legend: { orientation: 'h', y: -0.2 },
                    paper_bgcolor: 'rgba(0,0,0,0)',
                    plot_bgcolor: 'rgba(0,0,0,0)',
                    yaxis: { title: '°C', gridcolor: '#eee', titlefont: {size: 10} },
                    yaxis2: { 
                        title: '% Hum', 
                        overlaying: 'y', 
                        side: 'right', 
                        showgrid: false, 
                        range: [0, 100],
                        titlefont: {size: 10} 
                    },
                    xaxis: { tickfont: {size: 9}, gridcolor: '#eee' }
                };

                Plotly.newPlot(`plot_${i}`, [traceT, traceH], layout, {responsive: true, displayModeBar: false});
            }
        }

        // Executar ao abrir
        fetchData();
        // Atualizar a cada 5 minutos
        setInterval(fetchData, 300000);
    </script>
</body>
</html>
