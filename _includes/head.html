<!-- _includes/head.html -->
<!DOCTYPE html>
<html lang="{{ page.lang | default: 'pt' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <!-- SEO Básico -->
  <title>{% if page.title %}{{ page.title }} | {% endif %}Wild Alentejo — Regeneração Semiárida</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}Projeto de agricultura sintrópica e autonomia off-grid em Mértola, Alentejo. Dados IoT em tempo real.{% endif %}">
  <meta name="keywords" content="agricultura sintrópica, off-grid, regeneração, Mértola, Alentejo, IoT, semiárido">
  <link rel="canonical" href="{{ site.url }}{{ page.url }}">
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ site.url }}{{ page.url }}">
  <meta property="og:title" content="{% if page.title %}{{ page.title }} | {% endif %}Wild Alentejo">
  <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}Projeto de regeneração ecológica off-grid em Mértola{% endif %}">
  <meta property="og:image" content="{{ site.url }}/img/og-wildalentejo.jpg">
  <meta property="og:locale" content="{{ page.lang | default: 'pt_PT' }}">
  
  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{% if page.title %}{{ page.title }} | {% endif %}Wild Alentejo">
  <meta name="twitter:description" content="{% if page.description %}{{ page.description }}{% else %}Projeto de regeneração ecológica off-grid em Mértola{% endif %}">
  <meta name="twitter:image" content="{{ site.url }}/img/og-wildalentejo.jpg">
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/img/favicon.png">
  
  <!-- Schema.org JSON-LD -->
  {% include schema.html %}
  
  <!-- CSS (se aplicável) -->
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
