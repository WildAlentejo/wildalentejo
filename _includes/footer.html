<!-- _includes/footer.html -->
<footer>
  <div class="footer-content">
    <p>Wild Alentejo | {{ t.footer_tagline }}</p>
    <p>© 2026 Wild Alentejo | {{ t.footer_copy }}</p>
    <p>{{ t.footer_monitoring }} <a href="https://www.home-assistant.io/" rel="noopener" target="_blank">Home Assistant</a>.</p>
    
    <nav class="footer-nav">
      <a href="/sitemap.html">{{ t.footer_sitemap }}</a>
      <span>·</span>
      <a href="/privacidade.html">{{ t.footer_privacidade }}</a>
    </nav>
  </div>

  <!-- Cookie Banner -->
  <div id="cookie-banner">
    <p>{{ t.cookie_texto }} <a href="/privacidade.html">{{ t.cookie_politica }}</a>.</p>
    <button id="cookie-accept">{{ t.cookie_aceitar }}</button>
    <button id="cookie-decline">{{ t.cookie_recusar }}</button>
  </div>
</footer>
