  info1_p1: "Wild Alentejo operates as a living laboratory of 1000m² in Mértola, dedicated to reversing desertification through complex regenerative systems and total off-grid resource management."
  info1_p2: "The infrastructure integrates technical management of water, energy and biological resources to build resilience in semi-arid ecosystems, operating without dependency on external grids."
  info1_p3: "The system is based on the principles of <strong>syntropic agriculture</strong>: photovoltaic energy enables water management, feeding agroforestry systems that optimise soil thermoregulation and moisture retention to close the biological succession cycle."
