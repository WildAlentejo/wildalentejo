  agro_sec_timeline: "Evolução do Sistema"
  agro_tl1_data: "Set 2022"
  agro_tl1_h: "Preparação do Solo"
  agro_tl1_p: "Primeira intervenção: remoção de vegetação invasora, análise de solo e instalação do sistema de rega por gotejamento alimentado a energia solar."
  agro_tl2_data: "Nov 2023"
  agro_tl2_h: "Plantação Inicial"
  agro_tl2_p: "Instalação das pioneiras de crescimento rápido (Melia, Choupo, Amoreira, Eucalipto) e das espécies de clímax (Alfarrobeira, Sobreiro, Nespereira). 40+ espécies no total."
  agro_tl3_data: "Mai 2024"
  agro_tl3_h: "Primeira Poda de Estratificação"
  agro_tl3_p: "As pioneiras são podadas pela primeira vez, cobrindo o solo com biomassa fresca. Temperatura do solo desce 8ºC em relação ao exterior."
  agro_tl4_data: "Out 2024"
  agro_tl4_h: "Integração das Galinhas"
  agro_tl4_p: "13 aves de serviço entram em rotação no sistema. Fertilização natural, controlo de pragas e aração superficial sem qualquer input externo."
  agro_tl5_data: "2025 →"
  agro_tl5_h: "Sistema em Aceleração"
  agro_tl5_p: "Primeiros frutos colhidos. Solo com vida visível — minhocas, fungos micorrízicos, cobertura espontânea. O sistema começa a trabalhar por si."

