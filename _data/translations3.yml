  agro_sec1: "O que é a Agrofloresta Sintrópica"
  agro_h2: "Recriar a Floresta para Produzir Alimento"
  agro_p1: "A agrofloresta sintrópica é um método de cultivo inspirado na sucessão natural das florestas. Em vez de lutar contra a natureza, trabalhamos com os seus processos — cobrindo o solo, criando estratos de vegetação e alimentando a microbiologia com biomassa constante."
  agro_p2: "Em Mértola, onde o verão ultrapassa os 40ºC e a chuva é escassa, este sistema não é apenas uma escolha filosófica — é uma necessidade técnica. O solo descoberto perde humidade e vida. A floresta retém tudo."
  agro_p3: "Cada intervenção tem uma lógica: a poda não é destruição, é aceleração. A biomassa caída não é lixo, é adubo. As galinhas não são decoração, são motores de fertilização integrada."
  agro_prin_titulo: "Princípios do Sistema"
  agro_prin1_t: "Solo Sempre Coberto"
  agro_prin1_d: "Mulch de biomassa e lã de ovelha mantém a humidade, regula temperatura e alimenta fungos micorrízicos."
  agro_prin2_t: "Estratificação Vertical"
  agro_prin2_d: "Dossel, sub-dossel, arbustos, herbáceas e cobertura rasteira em simultâneo."
  agro_prin3_t: "Gestão Hídrica Crítica"
  agro_prin3_d: "Rega por gotejamento, monitorização do poço em tempo real via IoT."
  agro_prin4_t: "Integração Animal"
  agro_prin4_d: "13 galinhas de serviço: controlo de pragas, fertilização e aração natural."
