  info1_titulo: "📍 Engenharia de Ciclo Fechado"
  info1_p1: "O Wild Alentejo opera num laboratório vivo de 1000m² em Mértola, dedicado à reversão da desertificação através de sistemas regenerativos complexos e gestão de recursos em regime de total autonomia (<em>off-grid</em>)."
  info1_p2: "A infraestrutura integra a gestão técnica de recursos hídricos, energéticos e biológicos para estabelecer resiliência em ecossistemas semiáridos, operando sem dependência de redes externas."
  info1_p3: "O sistema baseia-se nos princípios da <strong>agricultura sintrópica</strong>: a energia fotovoltaica viabiliza a gestão hídrica, alimentando sistemas agroflorestais que otimizam a termorregulação do solo e a retenção de humidade para fechar o ciclo de sucessão biológica."
  info2_titulo: "⚙️ Princípios de Operação"
