  agro_sec1: "What is Syntropic Agroforestry"
  agro_h2: "Recreating the Forest to Produce Food"
  agro_p1: "Syntropic agroforestry is a cultivation method inspired by natural forest succession. Instead of fighting nature, we work with its processes — covering the soil, creating vegetation strata and feeding the microbiology with constant biomass."
  agro_p2: "In Mértola, where summer exceeds 40ºC and rain is scarce, this system is not just a philosophical choice — it is a technical necessity. Bare soil loses moisture and life. The forest retains everything."
  agro_p3: "Each intervention has a logic: pruning is not destruction, it is acceleration. Fallen biomass is not waste, it is fertiliser. Chickens are not decoration, they are integrated fertilisation engines."
  agro_prin_titulo: "System Principles"
  agro_prin1_t: "Soil Always Covered"
  agro_prin1_d: "Biomass and wool mulch maintains humidity, regulates temperature and feeds mycorrhizal fungi."
  agro_prin2_t: "Vertical Stratification"
  agro_prin2_d: "Canopy, sub-canopy, shrubs, herbaceous and ground cover simultaneously."
  agro_prin3_t: "Critical Water Management"
  agro_prin3_d: "Drip irrigation, real-time well monitoring via IoT."
  agro_prin4_t: "Animal Integration"
  agro_prin4_d: "13 service hens: pest control, fertilisation and natural tillage."
